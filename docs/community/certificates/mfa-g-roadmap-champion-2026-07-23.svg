  <g transform="translate(440 535)">
    <text x="0" y="0" fill="#8296ad" font-family="Inter, Segoe UI, sans-serif" font-size="13" letter-spacing="1">CERTIFICATE ID</text>
    <text x="0" y="27" fill="#f8fafc" font-family="Inter, Segoe UI, sans-serif" font-size="17">MOONSCONFIG-RC-2026-0001</text>
  </g>
  <g transform="translate(905 535)">
    <text x="0" y="0" fill="#8296ad" font-family="Inter, Segoe UI, sans-serif" font-size="13" letter-spacing="1">MAINTAINER</text>
    <text x="0" y="27" fill="#f8fafc" font-family="Inter, Segoe UI, sans-serif" font-size="17">MooN</text>
