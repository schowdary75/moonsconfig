  <text x="600" y="615" text-anchor="middle" fill="#718399" font-family="Inter, Segoe UI, sans-serif" font-size="12">Verify on github.com/schowdary75/moonsconfig · PR #22 · MOONSCONFIG-RC-2026-0001</text>
