name: Contributor recognition

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: write
  issues: read
  pull-requests: write

concurrency:
  group: contributor-recognition
  cancel-in-progress: false

jobs:
  refresh-leaderboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Refresh contributor leaderboard
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run community:recognition

      - name: Publish recognition update branch
        id: publish
        shell: bash
        run: |
          if git diff --quiet -- docs/community/LEADERBOARD.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "MooN"
          git config user.email "schowdary75@users.noreply.github.com"
          git switch -C moon/contributor-leaderboard
          git add docs/community/LEADERBOARD.md
          git commit -m "community: refresh contributor leaderboard"
          git push --force-with-lease --set-upstream origin moon/contributor-leaderboard
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open leaderboard pull request
        if: steps.publish.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          existing="$(gh pr list \
            --head moon/contributor-leaderboard \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "$existing" ]]; then
            gh pr edit "$existing" \
              --title "community: refresh contributor leaderboard" \
              --body "Refreshes the public contributor leaderboard from accepted GitHub activity."
          else
            gh pr create \
              --head moon/contributor-leaderboard \
              --base main \
              --title "community: refresh contributor leaderboard" \
              --body "Refreshes the public contributor leaderboard from accepted GitHub activity."
          fi
