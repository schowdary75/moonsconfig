                escapeHtml(p.name) +
                '</div>' +
                '<div class="wp-coords">' +
                p.lat.toFixed(3) +
                ', ' +
                p.lng.toFixed(3) +
                '</div>' +
                '</div>' +
                modeHtml +
                '<div class="wp-actions">' +
                '<button class="icon-btn" title="Move up" onclick="movePoint(\'' +
                p.id +
                '\',-1)" ' +
                (i === 0 ? 'disabled' : '') +
                '><i class="fa-solid fa-chevron-up"></i></button>' +
                '<button class="icon-btn" title="Move down" onclick="movePoint(\'' +
                p.id +
                '\',1)" ' +
                (i === points.length - 1 ? 'disabled' : '') +
                '><i class="fa-solid fa-chevron-down"></i></button>' +
                '<button class="icon-btn danger" title="Remove" onclick="deletePoint(\'' +
                p.id +
                '\')"><i class="fa-solid fa-xmark"></i></button>' +
                '</div>' +
                '</div>'
              );
            })
            .join('');
        }
        updateModeFieldVisibility();
        const routeCount = document.getElementById('routeCount');
        if (routeCount) {
          routeCount.textContent = points.length + (points.length === 1 ? ' point' : ' points');
        }
      }

      function fitAll(duration) {
        if (points.length === 0) return;
        const bounds = L.latLngBounds(
          points.map(function (p) {
            return [p.lat, p.lng];
          }),
        );
        map.flyToBounds(bounds, { padding: [90, 90], duration: duration || 0.8, maxZoom: 9 });
      }

      function handleAddPoint() {
        const nameEl = document.getElementById('inName');
        const latEl = document.getElementById('inLat');
        const lngEl = document.getElementById('inLng');
        const modeEl = document.getElementById('inMode');

        const lat = parseFloat(latEl.value);
        const lng = parseFloat(lngEl.value);

        if (Number.isNaN(lat) || lat < -90 || lat > 90) {
          showToast('Enter a valid latitude (-90 to 90).');
          latEl.focus();
          return;
        }
        if (Number.isNaN(lng) || lng < -180 || lng > 180) {
          showToast('Enter a valid longitude (-180 to 180).');
          lngEl.focus();
          return;
        }

        const name = nameEl.value.trim() || 'Point ' + (points.length + 1);
        const mode = points.length === 0 ? null : modeEl.value;

        points.push({ id: 'p' + pointSeq++, name: name, lat: lat, lng: lng, mode: mode });

        nameEl.value = '';
        latEl.value = '';
        lngEl.value = '';
        stopAnimation();
        renderPointsList();
        drawPreview();
        if (points.length === 1) map.setView([lat, lng], 6);
        else fitAll(0.8);
        nameEl.focus();
      }

      function movePoint(id, dir) {
        const idx = points.findIndex(function (p) {
          return p.id === id;
        });
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= points.length) return;
        const tmp = points[idx];
        points[idx] = points[newIdx];
        points[newIdx] = tmp;
        stopAnimation();
        renderPointsList();
        drawPreview();
      }

      function deletePoint(id) {
        points = points.filter(function (p) {
          return p.id !== id;
        });
        stopAnimation();
        renderPointsList();
        drawPreview();
        if (points.length) fitAll(0.8);
      }

      function clearAll() {
        points = [];
        stopAnimation();
        renderPointsList();
        drawPreview();
        map.setView([60, 15], 4);
      }

      function loadDemo() {
        points = DEMO_ROUTE.map(function (p) {
          return { id: 'p' + pointSeq++, name: p.name, lat: p.lat, lng: p.lng, mode: p.mode };
        });
        stopAnimation();
        renderPointsList();
        drawPreview();
        fitAll(1);
        showToast('Demo route loaded — press Play to animate the journey.');
      }

      /* ---------- animation engine ---------- */
      function setProgressBar(pct) {
        progressFill.style.width = Math.max(0, Math.min(100, pct)) + '%';
      }

      function updatePlayButton() {
        const btn = document.getElementById('playBtn');
        const icon = btn.querySelector('i');
        if (isLoadingRoute) {
          icon.className = 'fa-solid fa-spinner fa-spin';
          btn.title = 'Charting route…';
        } else if (isPlaying && !isPaused) {
          icon.className = 'fa-solid fa-pause';
          btn.title = 'Pause';
        } else {
          icon.className = 'fa-solid fa-play';
          btn.title = isPaused ? 'Resume' : 'Play';
        }
      }

      function stopAnimation() {
        runToken++;
        isPlaying = false;
        isPaused = false;
        if (animId) cancelAnimationFrame(animId);
        animId = null;
        if (animLayer) animLayer.clearLayers();
        movingMarker = null;
        activeLine = null;
        segIndex = 0;
        segElapsed = 0;
        if (progressFill) setProgressBar(0);
        updatePlayButton();
        if (legText)
          legText.textContent =
            points.length > 1
              ? 'Ready to play. Press ▶ to begin the journey.'
              : 'Add at least two waypoints to begin.';
      }

      function beginSegment(i) {
        const seg = segments[i];
        activeLine = L.polyline([], {
          color: MODES[seg.mode].color,
          weight: 4.5,
          opacity: 0.95,
          dashArray: MODES[seg.mode].dash,
          lineCap: 'round',
          lineJoin: 'round',
          className: 'glow-line glow-' + seg.mode,
        }).addTo(animLayer);
        if (movingMarker) {
          animLayer.removeLayer(movingMarker);
          movingMarker = null;
        }
        movingMarker = L.marker([seg.from.lat, seg.from.lng], {
          icon: createVehicleIcon(seg.mode),
          zIndexOffset: 1000,
        }).addTo(animLayer);
        setVehicleHeading(movingMarker, bearing(seg.from, seg.to));
        legText.textContent =
          'Leg ' +
          (i + 1) +
          ' of ' +
          segments.length +
          ' · ' +
          MODES[seg.mode].label +
          ' · ' +
          (seg.from.name || 'Point') +
          ' → ' +
          (seg.to.name || 'Point');
      }

      function stepAnimation(ts, myToken) {
        if (myToken !== runToken) return;
        if (!isPlaying || isPaused) return;

        const seg = segments[segIndex];
        const duration = segmentDuration(seg) / speedMultiplier;
        const elapsed = ts - segStartTS;
        const t = Math.min(1, elapsed / duration);
        const et = easeInOutCubic(t);
        const pos = pointAtT(seg, et);
        const posAhead = pointAtT(seg, Math.min(1, et + 0.01));
        const heading = bearing(pos, posAhead);

        const steps = Math.max(2, Math.round(70 * et));
        const pts = [];
        for (let i = 0; i < steps; i++) {
          const tt = (i / (steps - 1)) * et;
          const p = pointAtT(seg, tt);
          pts.push([p.lat, p.lng]);
        }
        activeLine.setLatLngs(pts);
        movingMarker.setLatLng([pos.lat, pos.lng]);
        setVehicleHeading(movingMarker, heading);

        if (!prefersReducedMotion) {
          cameraCenter = {
            lat: lerp(cameraCenter.lat, pos.lat, 0.06),
            lng: lerp(cameraCenter.lng, pos.lng, 0.06),
          };
          map.panTo([cameraCenter.lat, cameraCenter.lng], { animate: false });
        }

        setProgressBar(((segIndex + et) / segments.length) * 100);

        if (t >= 1) {
          dropWaypointLabel(seg.to, false);
          segIndex++;
          if (segIndex >= segments.length) {
            finishPlayback();
            return;
          }
          setTimeout(function () {
            if (myToken !== runToken) return;
            beginSegment(segIndex);
            segStartTS = performance.now();
            animId = requestAnimationFrame(function (ts2) {
              stepAnimation(ts2, myToken);
            });
          }, 350);
          return;
        }

        segElapsed = elapsed;
        animId = requestAnimationFrame(function (ts2) {
          stepAnimation(ts2, myToken);
        });
      }

      async function startPlayback() {
        if (points.length < 2) {
          showToast('Add at least two waypoints to begin the journey.');
          return;
        }

        if (isPaused) {
          isPaused = false;
          isPlaying = true;
          segStartTS = performance.now() - segElapsed;
          updatePlayButton();
          const myToken = runToken;
          animId = requestAnimationFrame(function (ts) {
            stepAnimation(ts, myToken);
          });
          return;
        }

        if (isPlaying || isLoadingRoute) return;

        stopAnimation();
        runToken++;
        const myToken = runToken;

        if (map.hasLayer(previewLayer)) map.removeLayer(previewLayer);

        isLoadingRoute = true;
        updatePlayButton();
        legText.textContent = 'Charting real routes…';
        setProgressBar(0);

        let built = { segments: [], fallbackCount: 0 };
        try {
          built = await buildSegments();
        } catch (err) {
          console.error('Route building failed', err);
        }
        isLoadingRoute = false;

        if (myToken !== runToken) {
          updatePlayButton();
          return;
        }

        if (!built.segments.length) {
          updatePlayButton();
          showToast('Could not build the route — try again.');
          legText.textContent = 'Ready to play. Press ▶ to begin the journey.';
          return;
        }

        segments = built.segments;
        segIndex = 0;
        segElapsed = 0;
        isPlaying = true;
        isPaused = false;
        updatePlayButton();

        if (built.fallbackCount > 0) {
          showToast(
            built.fallbackCount === 1
              ? 'One leg fell back to a straight line (routing service unavailable).'
              : built.fallbackCount +
                  ' legs fell back to straight lines (routing service unavailable).',
          );
        }

        const bounds = L.latLngBounds(
          points.map(function (p) {
            return [p.lat, p.lng];
          }),
        );
        cameraCenter = map.getCenter();
        map.flyToBounds(bounds, { padding: [90, 90], duration: 1.4, maxZoom: 8 });
        dropWaypointLabel(points[0], true);
        legText.textContent = 'Charting the course…';

        setTimeout(function () {
          if (myToken !== runToken) return;
          beginSegment(segIndex);
          segStartTS = performance.now();
          animId = requestAnimationFrame(function (ts) {
            stepAnimation(ts, myToken);
          });
        }, 1500);
      }

      function pausePlayback() {
        if (!isPlaying || isPaused) return;
        isPaused = true;
        if (animId) cancelAnimationFrame(animId);
        updatePlayButton();
      }

      function finishPlayback() {
        isPlaying = false;
        isPaused = false;
        updatePlayButton();
        setProgressBar(100);
        fitAll(1.2);
        showToast('Journey complete ✓');
        legText.textContent =
          'Journey complete — ' +
          segments.length +
          (segments.length === 1 ? ' leg' : ' legs') +
          ' travelled.';
      }

      function resetPlayback() {
        stopAnimation();
        if (!map.hasLayer(previewLayer)) previewLayer.addTo(map);
        drawPreview();
        if (points.length) fitAll(1);
      }

      /* ================= animated export (GIF / WebM) =================
   The live player is driven by requestAnimationFrame + wall-clock, which can't
   be captured reliably (rasterising a frame is far slower than 1/fps). So export
   uses a *deterministic* stepper: exportRenderAt(ms) renders the exact frame for
   a timestamp and we walk it sequentially, rasterising with the canvas
   compositor below. Output timing comes from the encoder, not real time. */
      const EXPORT = {
        fps: 15,
        introMs: 700,
        pauseMs: 350,
        outroMs: 1400,
        maxWidth: 960,
        running: false,
        /* Keep the camera still and framed on the whole route. The live player
     follows the vehicle, which is nice on screen but bad for a shareable clip:
     it ends up centred on the last stop (e.g. Galle, on the south coast) with
     half the frame empty ocean, and earlier legs scroll out of view. */
        followCamera: false,
        /* The live player caps at zoom 8 so a fly-in reads well. For an export we fit
     the route itself, so allow closer zoom — otherwise a small country renders
     tiny in a sea of blank water. */
        maxZoom: 13,
        padding: 70,
      };

      let expSegIdx = -1;
      let expLastLabelDropped = false;
      let _gifenc = null;

      async function loadGifenc() {
        if (!_gifenc) _gifenc = await import('https://cdn.jsdelivr.net/npm/gifenc@1.0.3/+esm');
        return _gifenc;
      }

      /* ---------- canvas compositor ----------
   We rasterise the map ourselves rather than using a DOM-to-image library.
   Those libraries wrap the cloned DOM in an <svg><foreignObject>, and Chrome
   takes tens of seconds to decode that for a map this complex (measured: >45s
   for a single frame — unusable). Drawing the layers directly is ~2 orders of
   magnitude faster because the tiles are already-decoded <img>s and Leaflet's
   vector overlay is already real SVG. */
      function loadImage(url) {
        return new Promise(function (res, rej) {
          const img = new Image();
          img.onload = function () {
            res(img);
          };
          img.onerror = function () {
            rej(new Error('image load failed'));
          };
          img.src = url;
        });
      }

      /* Serialise a live <svg> element to an <img>. Pure SVG (no foreignObject)
   decodes in ~2-6ms. Leaflet sets stroke/fill as attributes, so styling
   survives; only CSS filter glows are lost. */
      async function svgElToImage(svgEl, w, h) {
        const clone = svgEl.cloneNode(true);
        clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        clone.setAttribute('width', w);
        clone.setAttribute('height', h);
        /* Leaflet positions the overlay <svg> with an inline CSS transform AND gives it
     a matching viewBox origin. We already place the rasterised image using the
     element's on-screen rect (which includes that transform), so the clone must
     not re-apply it — otherwise the offset is counted twice and the route draws
     shifted off into the sea. */
        clone.style.transform = 'none';
        clone.style.position = 'static';
        clone.style.left = 'auto';
        clone.style.top = 'auto';
        const markup = new XMLSerializer().serializeToString(clone);
        const url = URL.createObjectURL(
          new Blob([markup], { type: 'image/svg+xml;charset=utf-8' }),
        );
        try {
          return await loadImage(url);
        } finally {
          URL.revokeObjectURL(url);
        }
      }

      function roundRectPath(ctx, x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      /* Markers are HTML divIcons, so we redraw them with canvas primitives, reading
   the live computed styles so this stays in sync with the CSS. */
      async function drawMarkerEl(ctx, el, mr, scale) {
        const px = function (v) {
          return v * scale;
        };
        const elStyle = window.getComputedStyle(el);
        if (elStyle.display === 'none' || elStyle.visibility === 'hidden') return;
        const alpha = parseFloat(elStyle.opacity);
        ctx.save();
        ctx.globalAlpha = isNaN(alpha) ? 1 : alpha;

        const vsvg = el.querySelector('svg.vehicle-svg');
        if (vsvg) {
          const glowEl = el.querySelector('.vehicle-glow');
          if (glowEl) {
            const gr = glowEl.getBoundingClientRect();
            const cx = px(gr.left - mr.left + gr.width / 2);
            const cy = px(gr.top - mr.top + gr.height / 2);
            const rad = Math.max(1, px(gr.width));
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
            grad.addColorStop(0, window.getComputedStyle(glowEl).backgroundColor);
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.save();
            ctx.globalAlpha = (isNaN(alpha) ? 1 : alpha) * 0.55;
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(cx, cy, rad, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
          const r = vsvg.getBoundingClientRect();
          if (r.width && r.height) {
            try {
              const img = await svgElToImage(vsvg, r.width, r.height);
              ctx.drawImage(
                img,
                px(r.left - mr.left),
                px(r.top - mr.top),
                px(r.width),
                px(r.height),
              );
            } catch (e) {}
          }
          ctx.restore();
          return;
        }

        const dot = el.querySelector('.wp-dot');
        if (dot) {
          const r = dot.getBoundingClientRect();
          const cs = window.getComputedStyle(dot);
          if (r.width) {
            const cx = px(r.left - mr.left + r.width / 2);
            const cy = px(r.top - mr.top + r.height / 2);
            const rad = px(r.width / 2);
            ctx.save();
            ctx.shadowColor = cs.backgroundColor;
            ctx.shadowBlur = px(8);
            ctx.fillStyle = cs.backgroundColor;
            ctx.beginPath();
            ctx.arc(cx, cy, rad, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }

        const plaque = el.querySelector('.wp-plaque');
        if (plaque && plaque.textContent.trim()) {
          const r = plaque.getBoundingClientRect();
          const cs = window.getComputedStyle(plaque);
          if (r.width && r.height) {
            const x = px(r.left - mr.left),
              y = px(r.top - mr.top);
            const w = px(r.width),
              h = px(r.height);
            roundRectPath(ctx, x, y, w, h, px(parseFloat(cs.borderTopLeftRadius) || 6));
            ctx.fillStyle = cs.backgroundColor;
            ctx.fill();
            const bw = parseFloat(cs.borderTopWidth) || 0;
            if (bw > 0) {
              ctx.lineWidth = px(bw);
              ctx.strokeStyle = cs.borderTopColor;
              ctx.stroke();
            }
            ctx.fillStyle = cs.color;
            ctx.font =
              (cs.fontWeight || '600') +
              ' ' +
              px(parseFloat(cs.fontSize) || 12) +
              'px ' +
              cs.fontFamily;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'left';
            ctx.fillText(
              plaque.textContent.trim(),
              x + px(parseFloat(cs.paddingLeft) || 8),
              y + h / 2,
            );
          }
        }
        ctx.restore();
      }

      /* The legend lives outside #map, so redraw it onto the frame. */
      function drawLegend(ctx, W, scale) {
        const px = function (v) {
          return v * scale;
        };
        const rows = [
          ['Land', MODES.road],
          ['Flights', MODES.flight],
          ['Cruise', MODES.cruise],
          ['Rail', MODES.rail],
        ];
        const padX = px(16),
          padY = px(12),
          rowH = px(20),
          swatch = px(22),
          gap = px(9);
        const w = px(150);
        const h = padY * 2 + px(14) + rows.length * rowH;
        const x = W - w - px(16),
          y = px(16);
        roundRectPath(ctx, x, y, w, h, px(12));
        ctx.fillStyle = 'rgba(10,17,40,0.86)';
        ctx.fill();
        ctx.lineWidth = Math.max(1, px(1));
        ctx.strokeStyle = 'rgba(201,162,39,0.35)';
        ctx.stroke();
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'left';
        ctx.fillStyle = '#c9a227';
        ctx.font = '600 ' + px(10.5) + 'px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.fillText('LEGEND', x + padX, y + padY + px(6));
        rows.forEach(function (row, i) {
          const cy = y + padY + px(20) + i * rowH + rowH / 2;
          ctx.save();
          ctx.strokeStyle = row[1].color;
          ctx.lineWidth = px(3);
          ctx.setLineDash(
            row[1].dash
              ? row[1].dash.split(' ').map(function (n) {
                  return px(parseFloat(n));
                })
              : [],
          );
          ctx.beginPath();
          ctx.moveTo(x + padX, cy);
          ctx.lineTo(x + padX + swatch, cy);
          ctx.stroke();
          ctx.restore();
          ctx.fillStyle = '#eef1f6';
          ctx.font =
            '400 ' +
            px(12) +
            'px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
          ctx.fillText(row[0], x + padX + swatch + gap, cy);
        });
      }

      /* Composites one frame: tiles -> vector overlay -> markers/labels -> legend. */
      async function renderMapToCanvas(scale) {
        const mapEl = document.getElementById('map');
        const mr = mapEl.getBoundingClientRect();
        const W = Math.max(2, Math.round(mr.width * scale));
        const H = Math.max(2, Math.round(mr.height * scale));
        const canvas = document.createElement('canvas');
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext('2d');
        const px = function (v) {
          return v * scale;
        };

        ctx.fillStyle = '#f8f9fa';
        ctx.fillRect(0, 0, W, H);

        /* 1) tiles — already decoded and CORS-clean, so drawImage is instant */
        const tiles = mapEl.querySelectorAll('img.leaflet-tile');
        for (let i = 0; i < tiles.length; i++) {
          const img = tiles[i];
          if (!img.complete || !img.naturalWidth) continue;
          const r = img.getBoundingClientRect();
          if (r.right < mr.left || r.left > mr.right || r.bottom < mr.top || r.top > mr.bottom)
            continue;
          /* Leaflet fades tiles in via requestAnimationFrame, which is throttled in
       background tabs — a loaded tile can sit at opacity 0 forever and the frame
       would come out blank. A loaded tile is always fully opaque for our purposes. */
          let op = parseFloat(window.getComputedStyle(img).opacity);
          if (isNaN(op)) op = 1;
          if (img.classList.contains('leaflet-tile-loaded')) op = 1;
          ctx.globalAlpha = op;
          try {
            ctx.drawImage(img, px(r.left - mr.left), px(r.top - mr.top), px(r.width), px(r.height));
          } catch (e) {}
        }
        ctx.globalAlpha = 1;

        /* 2) vector overlay (the route polylines) */
        const svgs = mapEl.querySelectorAll('.leaflet-overlay-pane svg');
        for (let i = 0; i < svgs.length; i++) {
          const svg = svgs[i];
          const r = svg.getBoundingClientRect();
          if (!r.width || !r.height) continue;
          try {
            const img = await svgElToImage(svg, r.width, r.height);
            ctx.drawImage(img, px(r.left - mr.left), px(r.top - mr.top), px(r.width), px(r.height));
          } catch (e) {}
        }

        /* 3) markers: vehicle + waypoint labels */
        const markers = mapEl.querySelectorAll('.leaflet-marker-pane > *');
        for (let i = 0; i < markers.length; i++) {
          await drawMarkerEl(ctx, markers[i], mr, scale);
        }

        /* 4) legend */
        drawLegend(ctx, W, scale);
        return canvas;
      }

      function post(msg) {
        try {
          if (window.parent && window.parent !== window) window.parent.postMessage(msg, '*');
        } catch (e) {}
      }
      function setExportStatus(label, progress) {
        const s = document.getElementById('exportStatus');
        const f = document.getElementById('exportFill');
        if (s) s.textContent = label;
        if (f && typeof progress === 'number') f.style.width = Math.round(progress * 100) + '%';
        post({ type: 'route-export-progress', label: label, progress: progress });
      }
      /* Yield so Leaflet can flush its DOM updates. requestAnimationFrame is paused in
   background tabs, so race it against a timer — otherwise an export stalls
   forever the moment the user switches tabs. We only need the DOM updated (we
   rasterise the DOM, not the painted output), so the timer path is equivalent. */
      function nextFrame() {
        return new Promise(function (r) {
          let done = false;
          const fin = function () {
            if (done) return;
            done = true;
            r();
          };
          requestAnimationFrame(function () {
            requestAnimationFrame(fin);
          });
          setTimeout(fin, 60);
        });
      }
      /* Leaflet loads tiles asynchronously while the camera pans; capturing before
   they arrive yields half-blank frames. */
      function waitForTiles(timeoutMs) {
        return new Promise(function (resolve) {
          if (!tilesLoading) return resolve();
          let done = false;
          const finish = function () {
            if (done) return;
            done = true;
            if (tileLayer) tileLayer.off('load', finish);
            clearTimeout(timer);
            resolve();
          };
          const timer = setTimeout(finish, timeoutMs || 2000);
          if (tileLayer) tileLayer.on('load', finish);
          else finish();
        });
      }

      function exportTotalMs() {
        let total = EXPORT.introMs + EXPORT.outroMs;
        for (let i = 0; i < segments.length; i++) {
          total += segmentDuration(segments[i]);
          if (i < segments.length - 1) total += EXPORT.pauseMs;
        }
        return total;
      }

      function exportRenderSeg(i, localT) {
        if (expSegIdx !== i) {
          if (expSegIdx >= 0 && expSegIdx < i) dropWaypointLabel(segments[expSegIdx].to, false);
          expSegIdx = i;
          beginSegment(i);
        }
        const seg = segments[i];
        const et = easeInOutCubic(Math.max(0, Math.min(1, localT)));
        const pos = pointAtT(seg, et);
        const posAhead = pointAtT(seg, Math.min(1, et + 0.01));
        const heading = bearing(pos, posAhead);
        const steps = Math.max(2, Math.round(70 * et));
        const pts = [];
        for (let k = 0; k < steps; k++) {
          const p = pointAtT(seg, (k / (steps - 1)) * et);
          pts.push([p.lat, p.lng]);
        }
        activeLine.setLatLngs(pts);
        movingMarker.setLatLng([pos.lat, pos.lng]);
        setVehicleHeading(movingMarker, heading);
        if (EXPORT.followCamera) {
          /* match the live 0.06-per-60fps camera smoothing at our export frame rate */
          const alpha = 1 - Math.pow(1 - 0.06, 60 / EXPORT.fps);
          cameraCenter = {
            lat: lerp(cameraCenter.lat, pos.lat, alpha),
            lng: lerp(cameraCenter.lng, pos.lng, alpha),
          };
          map.panTo([cameraCenter.lat, cameraCenter.lng], { animate: false });
        }
        setProgressBar(((i + et) / segments.length) * 100);
      }
      function exportRenderAt(ms) {
        if (ms <= EXPORT.introMs) {
          setProgressBar(0);
          return;
        }
        let t = ms - EXPORT.introMs;
        for (let i = 0; i < segments.length; i++) {
          const dur = segmentDuration(segments[i]);
          if (t <= dur) {
            exportRenderSeg(i, t / dur);
            return;
          }
          t -= dur;
          if (i < segments.length - 1) {
            if (t <= EXPORT.pauseMs) {
              exportRenderSeg(i, 1);
              return;
            }
            t -= EXPORT.pauseMs;
          }
        }
        exportRenderSeg(segments.length - 1, 1);
        if (!expLastLabelDropped) {
          dropWaypointLabel(segments[segments.length - 1].to, false);
          expLastLabelDropped = true;
          setProgressBar(100);
          legText.textContent =
            'Journey complete — ' +
            segments.length +
            (segments.length === 1 ? ' leg' : ' legs') +
            ' travelled.';
        }
      }

      async function prepareExport() {
        if (points.length < 2) throw new Error('Add at least two waypoints first.');
        stopAnimation();
        runToken++;
        if (map.hasLayer(previewLayer)) map.removeLayer(previewLayer);

        setExportStatus('Charting real routes…', 0.02);
        const built = await buildSegments();
        if (!built.segments.length) throw new Error('Could not build the route.');
        segments = built.segments;

        expSegIdx = -1;
        expLastLabelDropped = false;
        document.body.classList.add('exporting');
        animLayer.clearLayers();
        movingMarker = null;
        activeLine = null;

        /* Frame the real route geometry, not just the waypoints — a road/sea leg can
     bulge far outside the straight line between two stops, and fitting only the
     stops would crop it. */
        const bounds = L.latLngBounds(
          points.map(function (p) {
            return [p.lat, p.lng];
          }),
        );
        segments.forEach(function (seg) {
          seg.path.forEach(function (pt) {
            bounds.extend([pt[0], pt[1]]);
          });
        });
        map.invalidateSize();
        /* Leaflet snaps to integer zoom levels by default, so fitBounds rounds *down*
     and can leave the route at half the size it could be. Allow fractional zoom
     just for the export fit so the route actually fills the frame. */
        const prevSnap = map.options.zoomSnap;
        map.options.zoomSnap = 0;
        map.fitBounds(bounds, {
          padding: [EXPORT.padding, EXPORT.padding],
          maxZoom: EXPORT.maxZoom,
          animate: false,
        });
        map.options.zoomSnap = prevSnap;
        cameraCenter = map.getCenter();
        dropWaypointLabel(points[0], true);
        await waitForTiles(5000);
        await nextFrame();
      }

      function finishExport() {
        document.body.classList.remove('exporting');
        document.getElementById('exportOverlay').classList.remove('is-active');
        resetPlayback();
      }

      /* Walks the timeline once, handing each rasterised frame to onFrame(). */
      async function captureFrames(onFrame, onProgress) {
        const mapEl = document.getElementById('map');
        const totalMs = exportTotalMs();
        const frameCount = Math.max(2, Math.ceil((totalMs / 1000) * EXPORT.fps));
        const scale = Math.min(1, EXPORT.maxWidth / Math.max(1, mapEl.clientWidth));

        for (let i = 0; i < frameCount; i++) {
          exportRenderAt((i / (frameCount - 1)) * totalMs);
          await waitForTiles(1500);
          await nextFrame();
          const canvas = await renderMapToCanvas(scale);
          await onFrame(canvas, i, frameCount);
          if (onProgress) onProgress((i + 1) / frameCount);
        }
      }

      async function exportGif() {
        const gifenc = await loadGifenc();
        const GIFEncoder = gifenc.GIFEncoder,
          quantize = gifenc.quantize,
          applyPalette = gifenc.applyPalette;
        const gif = GIFEncoder();
        const delay = Math.round(1000 / EXPORT.fps);
        let work = null,
          wctx = null;

        await captureFrames(
          function (canvas) {
            if (!work) {
              work = document.createElement('canvas');
              work.width = canvas.width;
              work.height = canvas.height;
              wctx = work.getContext('2d', { willReadFrequently: true });
            }
            wctx.drawImage(canvas, 0, 0, work.width, work.height);
            const data = wctx.getImageData(0, 0, work.width, work.height).data;
            const palette = quantize(data, 256);
            const index = applyPalette(data, palette);
            gif.writeFrame(index, work.width, work.height, { palette: palette, delay: delay });
          },
          function (p) {
            setExportStatus('Rendering frames… ' + Math.round(p * 100) + '%', 0.02 + p * 0.9);
          },
        );

        setExportStatus('Encoding GIF…', 0.95);
        await nextFrame();
        gif.finish();
        return new Blob([gif.bytes()], { type: 'image/gif' });
      }

      /* WebCodecs gives each frame an explicit timestamp, so the encode is
   deterministic and runs as fast as the CPU allows. The obvious alternative,
   MediaRecorder, timestamps frames by wall clock — that forces a real-time
   playback pass, and browsers throttle background tabs (setTimeout is clamped to
   ~1/sec), which silently produces a slow-motion video. Hence WebCodecs first. */
      async function exportWebmWebCodecs() {
        const muxerMod = await import('https://cdn.jsdelivr.net/npm/webm-muxer@5.0.3/+esm');
        const Muxer = muxerMod.Muxer,
          ArrayBufferTarget = muxerMod.ArrayBufferTarget;
        let muxer = null,
          encoder = null,
          frameIndex = 0;
        const usPerFrame = 1e6 / EXPORT.fps;

        await captureFrames(
          function (canvas) {
            if (!muxer) {
              muxer = new Muxer({
                target: new ArrayBufferTarget(),
                video: {
                  codec: 'V_VP9',
                  width: canvas.width,
                  height: canvas.height,
                  frameRate: EXPORT.fps,
                },
              });
              encoder = new VideoEncoder({
                output: function (chunk, meta) {
                  muxer.addVideoChunk(chunk, meta);
                },
                error: function (e) {
                  console.error('VideoEncoder', e);
                },
              });
              encoder.configure({
                codec: 'vp09.00.10.08',
                width: canvas.width,
                height: canvas.height,
                bitrate: 6000000,
                framerate: EXPORT.fps,
              });
            }
            const frame = new VideoFrame(canvas, {
              timestamp: frameIndex * usPerFrame,
              duration: usPerFrame,
            });
            encoder.encode(frame, { keyFrame: frameIndex % (EXPORT.fps * 2) === 0 });
            frame.close();
            frameIndex++;
          },
          function (p) {
            setExportStatus('Rendering frames… ' + Math.round(p * 100) + '%', 0.02 + p * 0.9);
          },
        );

        if (!encoder) throw new Error('No frames captured.');
        setExportStatus('Encoding video…', 0.95);
        await encoder.flush();
        encoder.close();
        muxer.finalize();
        return new Blob([muxer.target.buffer], { type: 'video/webm' });
      }

      /* Fallback for browsers without WebCodecs: capture to JPEGs, then replay them
   into MediaRecorder at real speed. Requires the tab to stay in the foreground. */
      async function exportWebmMediaRecorder() {
        const blobs = [];
        let w = 0,
          h = 0;
        await captureFrames(
          async function (canvas) {
            w = canvas.width;
            h = canvas.height;
            const blob = await new Promise(function (r) {
              canvas.toBlob(r, 'image/jpeg', 0.92);
            });
            if (blob) blobs.push(blob);
          },
          function (p) {
            setExportStatus('Rendering frames… ' + Math.round(p * 100) + '%', 0.02 + p * 0.78);
          },
        );
        if (!blobs.length) throw new Error('No frames captured.');
        setExportStatus('Encoding video…', 0.82);

        const out = document.createElement('canvas');
        out.width = w;
        out.height = h;
        const octx = out.getContext('2d');
        const stream = out.captureStream(0);
        const track = stream.getVideoTracks()[0];
        const mime = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'].filter(
          function (m) {
            return window.MediaRecorder && MediaRecorder.isTypeSupported(m);
          },
        )[0];
        if (!mime) throw new Error('This browser cannot record WebM.');

        const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8000000 });
        const chunks = [];
        rec.ondataavailable = function (e) {
          if (e.data && e.data.size) chunks.push(e.data);
        };
        const stopped = new Promise(function (r) {
          rec.onstop = r;
        });
        rec.start();

        const interval = 1000 / EXPORT.fps;
        const t0 = performance.now();
        let nextBmp = createImageBitmap(blobs[0]);
        for (let i = 0; i < blobs.length; i++) {
          const bmp = await nextBmp;
          if (i + 1 < blobs.length) nextBmp = createImageBitmap(blobs[i + 1]);
          octx.drawImage(bmp, 0, 0);
          if (track.requestFrame) track.requestFrame();
          if (bmp.close) bmp.close();
          const wait = t0 + (i + 1) * interval - performance.now();
          if (wait > 0)
            await new Promise(function (r) {
              setTimeout(r, wait);
            });
          setExportStatus('Encoding video…', 0.82 + (i / blobs.length) * 0.15);
        }
        await new Promise(function (r) {
          setTimeout(r, 300);
        });
        rec.stop();
        await stopped;
        return new Blob(chunks, { type: 'video/webm' });
      }

      async function exportWebm() {
        if (typeof VideoEncoder !== 'undefined') {
          try {
            return await exportWebmWebCodecs();
          } catch (e) {
            console.warn('WebCodecs export failed, falling back to MediaRecorder', e);
          }
        }
        return await exportWebmMediaRecorder();
      }

      async function runExport(format) {
        if (EXPORT.running) return;
        EXPORT.running = true;
        document.getElementById('exportOverlay').classList.add('is-active');
        setExportStatus('Preparing…', 0);
        post({ type: 'route-export-start', format: format });
        try {
          await prepareExport();
          const blob = format === 'gif' ? await exportGif() : await exportWebm();
          setExportStatus('Done ✓', 1);
          post({ type: 'route-export-done', format: format, blob: blob, size: blob.size });
        } catch (err) {
          console.error('Export failed', err);
          showToast('Export failed: ' + ((err && err.message) || 'unknown error'));
          post({ type: 'route-export-error', message: String((err && err.message) || err) });
        } finally {
          EXPORT.running = false;
          finishExport();
        }
      }

      /* ---------- init ---------- */
      function init() {
        legText = document.getElementById('legText');
        progressFill = document.getElementById('progressFill');
        toastEl = document.getElementById('toast');

        map = L.map('map', { zoomControl: false, worldCopyJump: true }).setView([60, 15], 4);
        /* crossOrigin is required so the tiles can be rasterised into a canvas for
       the GIF/WebM export — without it the canvas is tainted and comes out blank.
       CARTO serves the basemaps with Access-Control-Allow-Origin: *. */
        tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
          subdomains: 'abcd',
          maxZoom: 19,
          crossOrigin: true,
        }).addTo(map);
        tileLayer.on('loading', function () {
          tilesLoading = true;
        });
        tileLayer.on('load', function () {
          tilesLoading = false;
        });
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        previewLayer = L.layerGroup().addTo(map);
        animLayer = L.layerGroup().addTo(map);

        map.on('click', function (e) {
          document.getElementById('inLat').value = e.latlng.lat.toFixed(4);
          document.getElementById('inLng').value = e.latlng.lng.toFixed(4);
          showToast('Coordinates captured — name it and press Add Point.');
        });

        document.getElementById('playBtn').addEventListener('click', function () {
          if (isLoadingRoute) return;
          if (isPlaying && !isPaused) pausePlayback();
          else startPlayback();
        });
        document.getElementById('resetBtn').addEventListener('click', resetPlayback);
        document.getElementById('speedSlider').addEventListener('input', function (e) {
          speedMultiplier = parseFloat(e.target.value);
          document.getElementById('speedReadout').textContent = speedMultiplier.toFixed(2) + '×';
        });
        document.getElementById('panelToggle').addEventListener('click', function () {
          document.getElementById('controlPanel').classList.toggle('collapsed');
          document.getElementById('panelToggle').classList.toggle('is-collapsed');
        });

        window.addEventListener('message', function (e) {
          if (e.data && e.data.type === 'route-export') {
            runExport(e.data.format === 'gif' ? 'gif' : 'webm');
            return;
          }
          if (Array.isArray(e.data)) {
            points = e.data;
            renderPointsList();
            resetPlayback();
            if (points.length > 1) {
              startPlayback();
            } else if (points.length === 1) {
              fitAll(1);
            }
          }
        });

        renderPointsList();
        updatePlayButton();
        loadSeaRoute().catch(function () {
          /* silently retried per-segment on first cruise leg */
        });
      }

      init();
    </script>
  </body>
</html>
