<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MooN – 44 WhatsApp Banners Dashboard & Live Editor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@700;800&family=Outfit:wght@600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ═══ PREMIUM STYLING SYSTEM ═══ */
      :root {
        --bg-main: #ffffff;
        --bg-card: #ffffff;
        --bg-input: #f9fafb;
        --border: rgba(0, 0, 0, 0.1);
        --border-active: #8b5cf6;
        --primary: #8b5cf6;
        --primary-glow: rgba(139, 92, 246, 0.35);
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --text-primary: #111827;
        --text-secondary: #4b5563;
        --text-muted: #6b7280;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg-main);
        color: var(--text-primary);
        font-family: 'DM Sans', sans-serif;
        padding: 0;
      }

      .container-inner {
        max-width: none;
        width: 100%;
        margin: 0;
      }

      h1 {
        font-family: 'Sora', sans-serif;
        color: var(--text-primary);
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 6px;
        letter-spacing: -0.8px;
      }
      .subtitle {
        color: var(--text-secondary);
        font-size: 14px;
        margin-bottom: 24px;
      }

      /* ═══ EXPANDABLE DESIGN REFERENCE PANEL ═══ */
      .ref-accordion {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        margin-bottom: 32px;
        overflow: hidden;
        transition: all 0.3s ease;
      }
      .ref-header {
        padding: 16px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        user-select: none;
        font-family: 'Sora', sans-serif;
        font-weight: 700;
        font-size: 16px;
      }
      .ref-header:hover {
        background: rgba(0, 0, 0, 0.02);
      }
      .ref-toggle-icon {
        font-size: 14px;
        transition: transform 0.3s ease;
      }
      .ref-accordion.closed .ref-toggle-icon {
        transform: rotate(-90deg);
      }
      .ref-accordion.closed .ref-content {
        max-height: 0;
        padding: 0 24px;
        border-top: 0px solid transparent;
      }
      .ref-content {
        max-height: 2000px;
        padding: 24px;
        border-top: 1px solid var(--border);
        transition: all 0.3s cubic-bezier(0, 1, 0, 1);
      }
      .ref-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
      }
      .ref-card {
        background: rgba(0, 0, 0, 0.02);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }
      .ref-card-title {
        font-family: 'Sora', sans-serif;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        color: var(--primary);
        margin-bottom: 8px;
      }
      .ref-card-text {
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.5;
      }

      /* ═══ FILTER BAR ═══ */
      .filter-bar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }
      .fbtn {
        font-size: 12px;
        font-family: 'DM Sans', sans-serif;
        padding: 8px 16px;
        border-radius: 20px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #6b7280;
        cursor: pointer;
        transition: all 0.15s;
      }
      .fbtn:hover {
        border-color: #d1d5db;
        color: #111827;
      }
      .fbtn.on {
        background: #111827;
        color: #ffffff;
        border-color: #111827;
        font-weight: 600;
      }

      .count {
        color: var(--text-muted);
        font-size: 13px;
        margin-bottom: 16px;
        font-weight: 500;
      }

      /* ═══ CARDS GRID (Optimized for 4 cards per row) ═══ */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }

      /* Banner Card Wrapper */
      .card-wrapper {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: all 0.25s ease;
      }
      .card-wrapper:hover {
        transform: translateY(-2px);
        border-color: rgba(0, 0, 0, 0.15);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      /* Standard Banner Card (Compact Layout) */
      .banner {
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        aspect-ratio: 1080/566;
        font-family: 'DM Sans', sans-serif;
        cursor: default;
        width: 100%;
      }
      .bg-img {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        z-index: 0;
        border-radius: inherit;
      }
      .overlay {
        position: absolute;
        inset: 0;
        z-index: 1;
        border-radius: inherit;
      }
      .content {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        padding: 14px 16px 12px;
      }
      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      .logo-wrap img {
        height: 18px;
        filter: brightness(0) invert(1);
        opacity: 0.95;
      }
      .mode-badge {
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 10px;
        backdrop-filter: blur(8px);
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .spacer {
        flex: 1;
      }
      .headline {
        font-family: 'Sora', sans-serif;
        font-size: 15px;
        font-weight: 800;
        line-height: 1.2;
        letter-spacing: -0.3px;
        margin-bottom: 4px;
        color: #fff;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
      }
      .supporting {
        font-size: 10px;
        line-height: 1.4;
        margin-bottom: 10px;
        opacity: 0.88;
        max-width: 80%;
      }
      .bottom-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .cta {
        font-size: 9px;
        font-weight: 700;
        padding: 6px 14px;
        border-radius: 20px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .trigger {
        font-size: 8px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        opacity: 0.55;
        color: #fff;
      }

      /* Banner Control Action Panel */
      .banner-actions {
        display: flex;
        gap: 6px;
      }
      .banner-actions button {
        flex: 1;
        padding: 8px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.03);
        color: var(--text-primary);
        font-family: 'DM Sans', sans-serif;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .banner-actions button:hover {
        background: var(--bg-input);
        border-color: rgba(0, 0, 0, 0.2);
      }
      .banner-actions .btn-download {
        background: var(--primary);
        color: #fff;
        border: none;
      }
      .banner-actions .btn-download:hover {
        background: #7c3aed;
        transform: scale(1.02);
      }

      /* Live Editor Modal preview specific overrides (Maintains large preview readability) */
      #editorLiveBannerCard {
        border-radius: 16px;
      }
      #editorLiveBannerCard .content {
        padding: 22px 24px 20px !important;
      }
      #editorLiveBannerCard .logo-wrap img {
        height: 24px !important;
      }
      #editorLiveBannerCard .mode-badge {
        font-size: 9px !important;
        padding: 4px 10px !important;
        border-radius: 12px !important;
      }
      #editorLiveBannerCard .headline {
        font-size: 20px !important;
        margin-bottom: 6px !important;
      }
      #editorLiveBannerCard .supporting {
        font-size: 12px !important;
        line-height: 1.5 !important;
        margin-bottom: 14px !important;
        max-width: 68% !important;
      }
      #editorLiveBannerCard .cta {
        font-size: 11px !important;
        padding: 8px 18px !important;
        border-radius: 30px !important;
      }
      #editorLiveBannerCard .trigger {
        font-size: 9px !important;
      }

      /* Custom sizes for ratios inside Editor Modal */
      .preview-container.ratio-square #editorLiveBannerCard .content {
        padding: 40px 32px 30px !important;
      }
      .preview-container.ratio-story #editorLiveBannerCard .content {
        padding: 50px 36px 40px !important;
      }
      .preview-container.ratio-square #editorLiveBannerCard .headline {
        font-size: 26px !important;
      }
      .preview-container.ratio-story #editorLiveBannerCard .headline {
        font-size: 24px !important;
      }

      /* Inline Dynamic Design Specs */
      .inline-specs {
        background: rgba(0, 0, 0, 0.015);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        font-size: 12px;
        display: none;
        animation: slide-down 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .inline-specs.visible {
        display: block;
      }
      .spec-row {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid rgba(0, 0, 0, 0.03);
      }
      .spec-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }
      .spec-label {
        font-family: 'Sora', sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        font-size: 10px;
        color: var(--primary);
        letter-spacing: 0.05em;
      }
      .spec-value {
        color: var(--text-secondary);
        line-height: 1.4;
      }

      /* ═══ LIVE EDITOR ACCENT MODAL ═══ */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        padding: 20px;
      }
      .modal-overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }
      .modal-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 28px;
        width: 100%;
        max-width: 1000px;
        height: 680px; /* Constrain desktop height to enforce scrolling */
        max-height: 90vh;
        overflow: hidden;
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        box-shadow:
          0 25px 50px rgba(0, 0, 0, 0.6),
          0 0 40px var(--primary-glow);
        transform: scale(0.95);
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .modal-overlay.visible .modal-card {
        transform: scale(1);
      }

      /* Modal Left: Live Interactive Preview */
      .modal-preview-panel {
        background: #ffffff;
        padding: 32px;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        height: 100%; /* Force height to match grid parent */
        overflow-y: auto;
      }
      .preview-title {
        font-family: 'Sora', sans-serif;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-secondary);
      }

      /* Interactive Preview Box */
      .preview-container {
        width: 100%;
        max-width: 480px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      /* Live Ratio Adaptors */
      .preview-container.ratio-landscape .banner {
        aspect-ratio: 1080/566;
      }
      .preview-container.ratio-square .banner {
        aspect-ratio: 1/1;
      }
      .preview-container.ratio-story .banner {
        aspect-ratio: 1080/1920;
        max-height: 480px;
      }
      /* Live custom sizes */
      .preview-container.ratio-square .content {
        padding: 40px 32px 30px;
      }
      .preview-container.ratio-story .content {
        padding: 50px 36px 40px;
      }
      .preview-container.ratio-square .headline {
        font-size: 26px;
      }
      .preview-container.ratio-story .headline {
        font-size: 24px;
      }

      /* Ratio Switcher Control Bar */
      .ratio-switch-bar {
        display: flex;
        gap: 6px;
        background: var(--bg-main);
        padding: 4px;
        border-radius: 12px;
        border: 1px solid var(--border);
      }
      .ratio-btn {
        font-family: 'DM Sans', sans-serif;
        font-size: 11px;
        font-weight: 700;
        padding: 6px 14px;
        background: transparent;
        color: var(--text-secondary);
        border: none;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.15s;
      }
      .ratio-btn.active {
        background: var(--bg-card);
        color: var(--text-primary);
        box-shadow: var(--shadow-sm);
      }

      /* Modal Right: Editor Control Panel */
      .modal-editor-panel {
        padding: 32px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        height: 100%; /* Force height to match grid parent */
        overflow-y: auto;
      }
      .editor-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .editor-header h2 {
        font-family: 'Sora', sans-serif;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.4px;
      }
      .close-modal-btn {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 20px;
        cursor: pointer;
        transition: color 0.15s;
      }
      .close-modal-btn:hover {
        color: var(--text-primary);
      }

      /* Form Controls */
      .editor-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .editor-label {
        font-family: 'Sora', sans-serif;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--text-secondary);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* Live Word Counters */
      .counter-tag {
        font-family: 'DM Sans', sans-serif;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 10px;
        text-transform: none;
      }
      .counter-tag.ok {
        background: rgba(16, 185, 129, 0.15);
        color: var(--success);
      }
      .counter-tag.warn {
        background: rgba(245, 158, 11, 0.15);
        color: var(--warning);
      }
      .counter-tag.bad {
        background: rgba(239, 68, 68, 0.15);
        color: var(--danger);
      }

      .editor-field input[type='text'],
      .editor-field select {
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 10px 14px;
        border-radius: 10px;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        transition: all 0.2s ease;
        width: 100%;
      }
      .editor-field input[type='text']:focus,
      .editor-field select:focus {
        outline: none;
        border-color: var(--border-active);
        box-shadow: 0 0 10px rgba(139, 92, 246, 0.15);
      }

      /* Preset Gradients Row */
      .gradient-presets {
        display: flex;
        gap: 6px;
      }
      .grad-preset-btn {
        flex: 1;
        height: 24px;
        border-radius: 6px;
        border: 1.5px solid var(--border);
        cursor: pointer;
        transition: all 0.15s;
      }
      .grad-preset-btn:hover {
        transform: scale(1.05);
      }
      .grad-preset-btn.active {
        border-color: var(--primary);
        box-shadow: 0 0 8px rgba(139, 92, 246, 0.4);
      }

      /* Toast message inside Editor */
      .editor-warning {
        font-size: 11px;
        color: var(--warning);
        background: rgba(245, 158, 11, 0.1);
        border: 1px solid rgba(245, 158, 11, 0.2);
        padding: 8px 12px;
        border-radius: 8px;
        line-height: 1.4;
        display: none;
      }
      .editor-warning.visible {
        display: block;
      }

      /* Download Action in Editor */
      .editor-footer {
        display: flex;
        gap: 12px;
        margin-top: 10px;
      }
      .editor-footer button {
        padding: 12px;
        border-radius: 12px;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        flex: 1;
      }
      .btn-save-dl {
        background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        color: #fff;
        border: none;
        box-shadow: 0 4px 14px rgba(139, 92, 246, 0.4);
      }
      .btn-save-dl:hover {
        background: linear-gradient(135deg, #9b72f8 0%, #884ffa 100%);
        box-shadow: 0 6px 18px rgba(139, 92, 246, 0.6);
        transform: translateY(-1px);
      }
      .btn-cancel {
        background: rgba(0, 0, 0, 0.05);
        color: var(--text-primary);
        border: 1px solid var(--border);
      }
      .btn-cancel:hover {
        background: rgba(0, 0, 0, 0.08);
      }

      /* ═══ RESPONSIVE ═══ */
      @media (max-width: 1000px) {
        .modal-card {
          grid-template-columns: 1fr;
          height: auto;
          max-height: 95vh;
          overflow-y: auto;
        }
        .modal-preview-panel {
          border-right: none;
          border-bottom: 1px solid var(--border);
          padding: 20px;
          height: auto;
          overflow-y: visible;
        }
        .modal-editor-panel {
          padding: 20px;
          height: auto;
          overflow-y: visible;
        }
      }
      @media (max-width: 768px) {
        body {
          padding: 0;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @keyframes slide-down {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container-inner">
      <!-- Filters & Counter -->
      <div class="filter-bar" id="fb"></div>
      <div class="count" id="cnt"></div>

      <!-- Banner Grid -->
      <div class="grid" id="grid"></div>
    </div>

    <!-- ═══ MODAL INTERACTIVE EDITOR ═══ -->
    <div class="modal-overlay" id="editorModal">
      <div class="modal-card">
        <!-- Modal Left: Interactive Live Preview -->
        <div class="modal-preview-panel">
          <span class="preview-title">Live Preview Container</span>

          <!-- Live Ratio Box -->
          <div class="preview-container ratio-landscape" id="editorPreviewBox">
            <!-- Live card will be injected here -->
          </div>

          <!-- Live Ratio Switches -->
          <div class="ratio-switch-bar">
            <button
              class="ratio-btn active"
              id="btnRatioLandscape"
              onclick="setEditorRatio('landscape')"
            >
              Landscape (1080x566)
            </button>
            <button class="ratio-btn" id="btnRatioSquare" onclick="setEditorRatio('square')">
              Square (1080x1080)
            </button>
            <button class="ratio-btn" id="btnRatioStory" onclick="setEditorRatio('story')">
              Story (1080x1920)
            </button>
          </div>
        </div>

        <!-- Modal Right: Editor Control Panel -->
        <div class="modal-editor-panel">
          <div class="editor-header">
            <h2 id="editorBannerTitle">Edit Banner</h2>
            <button class="close-modal-btn" onclick="closeEditor()">&times;</button>
          </div>

          <!-- Headline -->
          <div class="editor-field">
            <label class="editor-label">
              <span>Headline Text (4-7 words)</span>
              <span class="counter-tag" id="headCounter">0 words</span>
            </label>
            <input type="text" id="editHeadline" oninput="updateLivePreview()" />
          </div>

          <!-- Supporting Text -->
          <div class="editor-field">
            <label class="editor-label">
              <span>Supporting Text (8-14 words)</span>
              <span class="counter-tag" id="supportCounter">0 words</span>
            </label>
            <input type="text" id="editSupporting" oninput="updateLivePreview()" />
          </div>

          <!-- CTA Button Text -->
          <div class="editor-field">
            <label class="editor-label">
              <span>CTA Text (2-4 words)</span>
              <span class="counter-tag" id="ctaCounter">0 words</span>
            </label>
            <input type="text" id="editCTA" oninput="updateLivePreview()" />
          </div>

          <!-- Background Image -->
          <div class="editor-field">
            <label class="editor-label">Choose Preset or Upload Background Image</label>
            <div style="display: flex; gap: 8px; align-items: center">
              <select id="editBgSelect" onchange="onBgSelectChanged()" style="flex: 1">
                <option value="custom">-- Custom (URL / Upload) --</option>
                <option value="beach">🏖️ Beach Escape</option>
                <option value="luxury">🏨 Luxury Stay</option>
                <option value="wander">💼 Travel Suitcase / Business</option>
                <option value="family">👨‍👩‍👧 Family Holiday</option>
                <option value="couple">👩‍❤️‍👨 Couple Getaway</option>
                <option value="mountain">🏔️ Mountain Escape</option>
                <option value="city">🏙️ City Tour</option>
                <option value="hotel">🛎️ Premium Hotel Lobby</option>
                <option value="advisor">👔 Personal Travel Advisor</option>
                <option value="explore">⛵ Outdoor Adventure / Exploring</option>
                <option value="map">🗺️ Travel Map / Planning</option>
                <option value="phone">📱 Mobile Phone / WhatsApp</option>
                <option value="payment">💳 Easy Payment / Trust</option>
                <option value="itinerary">📋 Itinerary Planner</option>
                <option value="budget">💰 Budgeting / EMI</option>

      /**
       * Calculate word counts and validate WhatsApp constraints
       */
      function checkConstraints(headline, supporting, cta) {
        const countWords = (text) => (text.trim() === '' ? 0 : text.trim().split(/\s+/).length);

        const headCount = countWords(headline);
        const supportCount = countWords(supporting);
        const ctaCount = countWords(cta);

        // Update counter badges
        updateBadge('headCounter', headCount, 4, 7);
        updateBadge('supportCounter', supportCount, 8, 14);
        updateBadge('ctaCounter', ctaCount, 2, 4);

        // General Warning Box
        const warnBox = document.getElementById('editorWarningBox');
        const errors = [];

        if (headCount < 4 || headCount > 7) {
          errors.push(
            `Headline has ${headCount} words (Target: 4-7 words for optimal WhatsApp readability).`,
          );
        }
        if (supportCount < 8 || supportCount > 14) {
          errors.push(`Supporting text has ${supportCount} words (Target: 8-14 words).`);
        }
        if (ctaCount < 2 || ctaCount > 4) {
          errors.push(`CTA Button text has ${ctaCount} words (Target: 2-4 words).`);
        }

        if (errors.length > 0) {
          warnBox.innerHTML = `⚠️ <strong>WhatsApp Copy Guidelines Warning:</strong><br>${errors.join('<br>')}`;
          warnBox.classList.add('visible');
        } else {
          warnBox.classList.remove('visible');
        }
      }

      function updateBadge(id, count, min, max) {
        const badge = document.getElementById(id);
        badge.textContent = `${count} word${count === 1 ? '' : 's'}`;

        badge.className = 'counter-tag';
        if (count >= min && count <= max) {
          badge.classList.add('ok');
          badge.textContent += ' (Optimal)';
        } else if (count > 0 && (count === min - 1 || count === max + 1)) {
          badge.classList.add('warn');
          badge.textContent += ' (Acceptable)';
        } else {
          badge.classList.add('bad');
          badge.textContent += ` (Goal: ${min}-${max})`;
        }
      }

      /**
       * Re-render live preview box inside Editor
       */
      function updateLivePreview() {
        if (!editingBannerId) return;
        const original = B.find((b) => b.id === editingBannerId);
        if (!original) return;

        const headline = document.getElementById('editHeadline').value;
        const supporting = document.getElementById('editSupporting').value;
        const cta = document.getElementById('editCTA').value;

        // Background Image
        const selectVal = document.getElementById('editBgSelect').value;
        const customVal = document.getElementById('editBgUrl').value;
        const finalImg = selectVal === 'custom' ? customVal : IMG[selectVal];

        // Gradient
        const finalGrad = GRADIENTS[currentPresetGradient];

        // Typography & Custom Colors
        const font = document.getElementById('editFontFamily').value;
        const textColorSelect = document.getElementById('editTextColor').value;
        const textColor =
          textColorSelect === 'custom'
            ? document.getElementById('editTextColorPicker').value
            : textColorSelect;

        const accentSelect = document.getElementById('editAccentColor').value;
        const accentColor =
          accentSelect === 'custom'
            ? document.getElementById('editAccentColorPicker').value
            : accentSelect === 'default'
              ? original.accent
              : accentSelect;

        // Button background / Text color based on accent
        let ctaBg = original.ctaBg;
        let ctaText = original.ctaText;
        if (accentSelect !== 'default') {
          ctaBg = accentColor;
          ctaText = '#0f0f16';
        }

        // Font size overrides
        const fontSize = document.getElementById('editFontSize').value;
        let headlineSizeStyle = '';
        let supportingSizeStyle = '';
        if (fontSize === 'small') {
          headlineSizeStyle = 'font-size: 14px !important;';
          supportingSizeStyle = 'font-size: 9px !important;';
        } else if (fontSize === 'medium') {
          headlineSizeStyle = 'font-size: 20px !important;';
          supportingSizeStyle = 'font-size: 12px !important;';
        } else if (fontSize === 'large') {
          headlineSizeStyle = 'font-size: 26px !important;';
          supportingSizeStyle = 'font-size: 14px !important;';
        }

        // Layout alignments & Vertical position
        const textAlign = document.getElementById('editTextAlign').value;
        const valign = document.getElementById('editTextValign').value;
        const flexAlign =
          textAlign === 'left' ? 'flex-start' : textAlign === 'right' ? 'flex-end' : 'center';

        // Decide spacer display
        const spacerDisplay = valign === 'flex-end' ? 'display:block; flex:1;' : 'display:none;';
        const textBlockMargin = valign === 'flex-start' ? 'margin-top: 36px;' : '';

        // Get checkbox visibility states
        const hideLogo = document.getElementById('hideLogo').checked;
        const hideMode = document.getElementById('hideMode').checked;
        const hideMeta = document.getElementById('hideMeta').checked;
        const hideCTA = document.getElementById('hideCTA').checked;
        const hideTrigger = document.getElementById('hideTrigger').checked;
        const hideDeco = document.getElementById('hideDeco').checked;

        const logoStyle = hideLogo ? 'display:none;' : '';
        const modeStyle = hideMode ? 'display:none;' : '';
        const metaStyle = hideMeta ? 'display:none;' : '';
        const ctaStyle = hideCTA ? 'display:none;' : '';
        const triggerStyle = hideTrigger ? 'display:none;' : '';

        // Render mock card decors
        let decos = '';
        if (!hideDeco) {
          decos = original.deco
            .map((d) => {
              let style = `position:absolute;border-radius:50%;width:${d.w}px;height:${d.h}px;background:${d.bg};pointer-events:none;z-index:1;`;
              if (d.bot !== undefined) style += `bottom:${d.bot}px;`;
              if (d.right !== undefined) style += `right:${d.right}px;`;
              if (d.top !== undefined) style += `top:${d.top}px;`;
              if (d.left !== undefined) style += `left:${d.left}px;`;
              return `<div style="${style}"></div>`;
            })
            .join('');
        }

        const container = document.getElementById('editorPreviewBox');
        container.innerHTML = `
    <div class="banner" id="editorLiveBannerCard" style="font-family:${font};">
      <div class="bg-img" style="background-image:url('${finalImg}'); border-radius: inherit;"></div>
      <div class="overlay" style="background:${finalGrad}; border-radius: inherit;"></div>
      ${decos}
      <div class="content" style="display:flex; flex-direction:column; justify-content:${valign}; align-items:${flexAlign}; text-align:${textAlign};">
        <div class="top-row" style="position:absolute; top:14px; left:16px; right:16px; display:flex; justify-content:space-between; align-items:flex-start; z-index:3;">
          <div class="logo-wrap" style="${logoStyle}"><img src="${LOGO}" alt="MooN" onerror="this.style.display='none';this.parentNode.innerHTML='<span style=&quot;font-family:Sora,sans-serif;font-weight:800;font-size:18px;color:#fff;letter-spacing:-0.5px&quot;>MooN</span>'"></div>
          <span class="mode-badge" style="${modeStyle}">${original.mode === 'On Demand' ? '⚡ On Demand' : '🕐 Scheduled'}</span>
        </div>
        <div class="spacer" style="${spacerDisplay}"></div>
        <div style="width: 100%; display: flex; flex-direction: column; align-items:${flexAlign}; ${textBlockMargin} z-index: 2;">
          <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:${accentColor};margin-bottom:5px;opacity:.9; ${metaStyle}" id="meta-tag-preview">${original.tag} · Preview Mode</div>
          <div class="headline" style="color:${textColor}; ${headlineSizeStyle}">${headline}</div>
          <div class="supporting" style="color:${textColor}; opacity: 0.88; max-width:85%; ${supportingSizeStyle}">${supporting}</div>
          <div class="bottom-row" style="display:flex; align-items:center; justify-content:space-between; width:100%; margin-top: 4px;">
            <span class="cta" style="background:${ctaBg}; color:${ctaText}; ${ctaStyle}">${cta}</span>
            <span class="trigger" style="color:${textColor}; opacity:0.55; ${triggerStyle}">${original.trigger}</span>
          </div>
        </div>
      </div>
    </div>
  `;

        // Check guidelines in real-time
        checkConstraints(headline, supporting, cta);
      }

      /**
       * ═══ HIGH-RESOLUTION HTML2CANVAS EXPORTS ═══ */

      /**
       * Download standard banner directly from grid
       */
      function downloadBanner(id) {
        const original = B.find((b) => b.id === id);
        const cardWrapper = document.getElementById(`wrapper-${id}`);
        const bannerEl = document.getElementById(`banner-${id}`);
        const specsEl = document.getElementById(`specs-${id}`);

        // Temporarily close specs panel to keep render context clean
        const wasSpecsVisible = specsEl.classList.contains('visible');
        specsEl.classList.remove('visible');

        // Find and temporarily hide elements not desired in the exported PNG
        const modeBadge = bannerEl.querySelector('.mode-badge');
        const triggerText = bannerEl.querySelector('.trigger');
        if (modeBadge) modeBadge.style.display = 'none';
        if (triggerText) triggerText.style.display = 'none';

        // Trigger html2canvas
        html2canvas(bannerEl, {
          useCORS: true,
          allowTaint: true,
          scale: 2, // High resolution (double density)
          backgroundColor: null, // Transparent rounded corners
          onclone: (clonedDoc) => {
            const clonedBody = clonedDoc.body;
            if (clonedBody) {
              clonedBody.style.backgroundColor = 'transparent';
              clonedBody.style.background = 'none';
            }
            const clonedWrapper = clonedDoc.getElementById(`wrapper-${id}`);
            if (clonedWrapper) {
              clonedWrapper.style.backgroundColor = 'transparent';
              clonedWrapper.style.background = 'none';
            }
            const clonedBanner = clonedDoc.getElementById(`banner-${id}`);
            if (clonedBanner) {
              clonedBanner.style.backgroundColor = 'transparent';
              clonedBanner.style.background = 'none';
              const bgImg = clonedBanner.querySelector('.bg-img');
              if (bgImg) bgImg.style.borderRadius = '12px';
              const overlay = clonedBanner.querySelector('.overlay');
              if (overlay) overlay.style.borderRadius = '12px';
            }
          },
        })
          .then((canvas) => {
            let text = '';
            if (typeof leadPhone !== 'undefined' && leadPhone) {
              let greeting = leadName ? `Hi ${leadName},\n\n` : `Hi,\n\n`;
              text = greeting + original.headline + '.\n' + original.supporting;
              if (leadDest) text += `\nRegarding: ${leadDest}`;
            }

            // Try to copy image to clipboard
            canvas.toBlob((blob) => {
              try {
                const item = new ClipboardItem({ 'image/png': blob });
                navigator.clipboard
                  .write([item])
                  .then(() => {
                    if (leadPhone) {
                      window.open(
                        `https://wa.me/${leadPhone.replace(/\D/g, '')}?text=${encodeURIComponent(text)}`,
                        '_blank',
                      );
                    } else {
                      alert('Banner copied to clipboard! You can now paste it.');
                    }
                  })
                  .catch((err) => {
                    console.error('Clipboard copy failed:', err);
                    fallbackDownload(canvas, id, original.name, leadPhone, text);
                  });
              } catch (e) {
                console.error('ClipboardItem not supported:', e);
                fallbackDownload(canvas, id, original.name, leadPhone, text);
              }
            }, 'image/png');

            function fallbackDownload(cnv, bId, bName, lPhone, lText) {
              const link = document.createElement('a');
              link.download = `MooN-banner-${bId}-${bName.toLowerCase().replace(/\s+/g, '-')}.png`;
              link.href = cnv.toDataURL('image/png');
              link.click();
              if (lPhone) {
                navigator.clipboard.writeText(lText).catch(() => {});
                window.open(
                  `https://wa.me/${lPhone.replace(/\D/g, '')}?text=${encodeURIComponent(lText)}`,
                  '_blank',
                );
              }
            }

            // Restore elements
            if (wasSpecsVisible) specsEl.classList.add('visible');
            if (modeBadge) modeBadge.style.display = '';
            if (triggerText) triggerText.style.display = '';
          })
          .catch((err) => {
            console.error('Canvas render failed:', err);
            alert('Export failed. Please check internet connections for Unsplash presets.');
            // Restore elements on failure
            if (wasSpecsVisible) specsEl.classList.add('visible');
            if (modeBadge) modeBadge.style.display = '';
            if (triggerText) triggerText.style.display = '';
          });
      }

      function downloadEditedBanner() {
        if (!editingBannerId) return;
        const original = B.find((b) => b.id === editingBannerId);
        const bannerEl = document.getElementById('editorLiveBannerCard');

        html2canvas(bannerEl, {
          useCORS: true,
          allowTaint: true,
          scale: 2,
          backgroundColor: null, // Transparent rounded corners
          onclone: (clonedDoc) => {
            const clonedBody = clonedDoc.body;
            if (clonedBody) {
              clonedBody.style.backgroundColor = 'transparent';
              clonedBody.style.background = 'none';
            }
            const previewPanel = clonedDoc.querySelector('.modal-preview-panel');
            if (previewPanel) {
              previewPanel.style.backgroundColor = 'transparent';
              previewPanel.style.background = 'none';
            }
            const modalOverlay = clonedDoc.querySelector('.modal-overlay');
            if (modalOverlay) {
              modalOverlay.style.backgroundColor = 'transparent';
              modalOverlay.style.background = 'none';
            }
            const clonedBanner = clonedDoc.getElementById('editorLiveBannerCard');
            if (clonedBanner) {
              clonedBanner.style.backgroundColor = 'transparent';
              clonedBanner.style.background = 'none';
              const style = window.getComputedStyle(bannerEl);
              const radius = style.borderRadius || '16px';
              const bgImg = clonedBanner.querySelector('.bg-img');
              if (bgImg) bgImg.style.borderRadius = radius;
              const overlay = clonedBanner.querySelector('.overlay');
              if (overlay) overlay.style.borderRadius = radius;
            }
          },
        })
          .then((canvas) => {
            const headline = document.getElementById('editHeadline').value;
            const supporting = document.getElementById('editSupporting').value;
            let text = '';
            if (typeof leadPhone !== 'undefined' && leadPhone) {
              let greeting = leadName ? `Hi ${leadName},\n\n` : `Hi,\n\n`;
              text = greeting + headline + '.\n' + supporting;
              if (leadDest) text += `\nRegarding: ${leadDest}`;
            }

            // Try to copy image to clipboard
            canvas.toBlob((blob) => {
              try {
                const item = new ClipboardItem({ 'image/png': blob });
                navigator.clipboard
                  .write([item])
                  .then(() => {
                    if (leadPhone) {
                      window.open(
                        `https://wa.me/${leadPhone.replace(/\D/g, '')}?text=${encodeURIComponent(text)}`,
                        '_blank',
                      );
                    } else {
                      alert('Banner copied to clipboard! You can now paste it.');
                    }
                  })
                  .catch((err) => {
                    fallbackDownloadEdited(canvas, editingBannerId, original.name, leadPhone, text);
                  });
              } catch (e) {
                fallbackDownloadEdited(canvas, editingBannerId, original.name, leadPhone, text);
              }
            }, 'image/png');

            function fallbackDownloadEdited(cnv, bId, bName, lPhone, lText) {
              const link = document.createElement('a');
              link.download = `MooN-edited-banner-${bId}-${bName.toLowerCase().replace(/\s+/g, '-')}.png`;
              link.href = cnv.toDataURL('image/png');
              link.click();
              if (lPhone) {
                navigator.clipboard.writeText(lText).catch(() => {});
                window.open(
                  `https://wa.me/${lPhone.replace(/\D/g, '')}?text=${encodeURIComponent(lText)}`,
                  '_blank',
                );
              }
            }

            closeEditor();
          })
          .catch((err) => {
            console.error('Canvas render failed:', err);
            alert('Export failed. Check internet connections for presets.');
          });
      }

      // Initial renders
      renderFilters();
      render();
    </script>
  </body>
</html>
