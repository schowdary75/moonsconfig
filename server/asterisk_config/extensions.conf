[general]
static=yes
writeprotect=no

[globals]
; MixMonitor writes full two-way recordings straight into the Node server's
; uploads/recordings folder (visible from WSL via /mnt/c). A polling reconciler
; in the API ingests finalized files into the call_recordings table.
RECDIR=/mnt/c/travangular/MooNsConfig/uploads/recordings

[from-webrtc]
; Outbound: employee (WebRTC softphone) -> customer via the Android GSM gateway.
exten => _X.,1,NoOp(Outbound from WebRTC to ${EXTEN})
same => n,Answer()
same => n,Set(REC_FROM=${IF($["${CALLERID(num)}" != ""]?${FILTER(0-9A-Za-z+,${CALLERID(num)})}:webrtc)})
same => n,Set(REC_TO=${IF($["${EXTEN}" != ""]?${FILTER(0-9A-Za-z+,${EXTEN})}:unknown)})
same => n,Set(REC_FILE=outbound__${REC_FROM}__${REC_TO}__${UNIQUEID}.wav)
same => n,MixMonitor(${RECDIR}/${REC_FILE})
; b() plays the recording notice to the customer after they answer, before bridging.
same => n,Dial(PJSIP/${EXTEN}@moon,30,b(handlers^consent^1))
same => n,Hangup()

[from-gsm]
; Inbound: customer -> Maya AI (Stasis app). MixMonitor captures the whole conversation.
exten => _X.,1,NoOp(Inbound call from GSM Gateway ${CALLERID(num)})
same => n,Answer()
same => n,Set(REC_FROM=${IF($["${CALLERID(num)}" != ""]?${FILTER(0-9A-Za-z+,${CALLERID(num)})}:unknown)})
same => n,Set(REC_TO=maya)
same => n,Set(REC_FILE=inbound__${REC_FROM}__${REC_TO}__${UNIQUEID}.wav)
same => n,MixMonitor(${RECDIR}/${REC_FILE})
same => n,Playback(consent-recording)
same => n,Stasis(moonsconfig_voice)
same => n,Hangup()

[handlers]
; Consent notice played to the callee (customer) on outbound calls before bridging.
exten => consent,1,Playback(consent-recording)
same => n,Return()
