[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0

; ===================================
; WebRTC Client (React Dashboard)
; ===================================
[webrtc_client]
type=endpoint
transport=transport-wss
context=from-webrtc
disallow=all
allow=opus,ulaw,alaw
aors=webrtc_client
auth=webrtc_client
webrtc=yes
dtls_auto_generate_cert=yes
ice_support=yes
use_avpf=yes
media_encryption=dtls

[webrtc_client]
type=aor
max_contacts=2
remove_existing=yes

[webrtc_client]
type=auth
auth_type=userpass
password=webrtc_secret
username=webrtc_client

; ===================================
; GSM Gateway (Android Phone)
; ===================================
[moon]
type=endpoint
transport=transport-udp
context=from-gsm
disallow=all
allow=ulaw,alaw,gsm
rewrite_contact=yes
force_rport=yes
aors=moon
auth=moon_auth
outbound_auth=moon_auth

[moon]
type=aor
max_contacts=1

[moon_auth]
type=auth
auth_type=userpass
password=moon
username=moon
